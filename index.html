<!doctype html>

<head>
  <meta charset="utf-8" />
  <script>
    // Applied before the stylesheet paints, since the module script that
    // normally owns theming (js/theme.js) runs after HTML parsing and would
    // otherwise flash the default theme first on every load.
    try {
      var themeMode = (JSON.parse(localStorage.getItem("wid_theme_v1") || "{}") || {}).mode;
      if (themeMode) document.documentElement.dataset.theme = themeMode;
    } catch (e) {}
  </script>

  <template id="tpl-how-it-works">
    <div class="sheet">
      <header class="sheet-header">
        <h2>How this app works</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <div class="instructions-body">
        <section>
          <h3>It's a PWA</h3>
          <p>This is a "Progressive Web App" — a website that behaves like an installed app. Add it to your Home Screen from the browser's share/menu button and it opens full-screen and works offline, no app store involved.</p>
        </section>
        <section>
          <h3>Your data, your device</h3>
          <p>There's no central database. Everything you enter lives only in this browser, on this device — nothing is sent to a server, because there isn't one.</p>
        </section>
        <section>
          <h3>Backups are on you</h3>
          <p>That also means backing up is your responsibility. There's no account recovery and no "we've got your data" safety net — export a backup every so often, especially before switching devices or clearing your browser's data.</p>
        </section>
        <section>
          <h3>The app itself can still update</h3>
          <p>The look, features, and bug fixes can improve over time — that's just code changing. Updates never touch your data; it stays exactly where it is.</p>
        </section>
      </div>
      <div class="form-actions">
        <button type="button" class="text-btn primary" id="how-it-works-got-it-btn">Got it</button>
      </div>
    </div>
  </template>

  <template id="tpl-instructions">
    <div class="sheet instructions-sheet">
      <header class="sheet-header">
        <h2>Instructions</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <div class="instructions-body">
        <section>
          <h3>Installing on your phone</h3>
          <p>This is a web app, not an app-store app — add it to your Home Screen so it opens full-screen, just like a regular app.</p>
          <p><strong>iOS (Safari):</strong> tap the Share icon, then "Add to Home Screen".</p>
          <p><strong>Android (Chrome):</strong> tap the ⋮ menu, then "Add to Home screen" (or "Install app").</p>
        </section>
        <section>
          <h3>How it works</h3>
          <p>Every day the app picks one bodyweight exercise for you. Do it, tap done, and your streak grows. The exercise rotates automatically — no setup needed.</p>
        </section>
        <section>
          <h3>Level</h3>
          <p>Choose Easy, Medium, Hard, or Brutal on Day 1 — it scales every exercise's reps and hold times up or down. Change it anytime from Settings &gt; <strong>Set level</strong>.</p>
        </section>
        <section>
          <h3>Streaks &amp; freezes</h3>
          <p>Complete an exercise every day to build your streak. Every 7-day streak automatically earns you a <strong>streak freeze</strong> (❄, max 2 stored) — no action needed. If you miss exactly one day and have a freeze banked, it silently bridges that gap the moment you complete your next workout, so your streak keeps going instead of resetting to zero.</p>
        </section>
        <section>
          <h3>Reminders</h3>
          <p>This app doesn't send push notifications — it's just a page, with no server behind it to trigger them. The most reliable way to protect your streak is to set up your own daily reminder outside the app:</p>
          <p><strong>iOS:</strong> add a recurring daily alert in Reminders or Calendar, or build a Shortcuts automation ("Time of Day" trigger → send a notification) for a nicer custom nudge.</p>
          <p><strong>Android:</strong> a daily Calendar event or a Google Assistant routine works the same way.</p>
        </section>
        <section>
          <h3>Weekly challenge</h3>
          <p>Every 7th day of an active streak swaps in a harder move from the challenge pool — a little extra to mark the milestone.</p>
        </section>
        <section>
          <h3>Calendar &amp; saving missed days</h3>
          <p>Tap "Calendar" on the home screen to see every day you've done, missed, or had a freeze cover. A day only stays marked as missed if no freeze was available to bridge it — for example, if you'd already used your freeze or missed more than one day in a row. Tap a missed day to save it retroactively: you'll do a harder makeup exercise (1.5× penalty) so it still counts toward your streak instead of leaving a gap.</p>
        </section>
        <section>
          <h3>Badges</h3>
          <p><strong>Milestones</strong> 🎖️ unlock 9 times a year at short-term streak checkpoints (3, 7, 14, 30 days and beyond), refreshing to a fresh set of 9 every time a new year starts — nothing you've earned is ever lost, it just moves into the badges sheet's history.</p>
          <p>Each year's 10th badge is its <strong>Cup</strong> 🏆, at the full-year mark.</p>
          <p><strong>Elite</strong> 💎 badges unlock every 500 days (and every 1000 workouts) for the long haul, and a few one-time <strong>Bonus</strong> 🏅 badges reward workout totals and trying every category.</p>
          <p>Milestones, Cups, and Elite all keep going indefinitely — there's always another one waiting, however many years you keep the streak going. Tap "Badges" on the home screen to see them all.</p>
        </section>
        <section>
          <h3>Your data</h3>
          <p>Everything is stored only on this device — no account, no server. Nothing is backed up automatically, so if you switch phones or clear your browser data, your streak is gone unless you've exported it.</p>
          <p><strong>Removing the app from your Home Screen deletes its saved data too.</strong></p>
          <p>Use <strong>Export backup</strong> in the gear menu every so often, and <strong>Import backup</strong> to restore it. The app will remind you every couple of weeks.</p>
        </section>
        <section>
          <h3>Themes</h3>
          <p>Pick Dark, Light, or Playful from the gear menu. Playful lets you choose your own accent color too.</p>
        </section>
      </div>
    </div>
  </template>

          <button type="button" class="swatch-btn" data-accent="lagoon" aria-label="Lagoon"></button>
          <button type="button" class="swatch-btn" data-accent="mint" aria-label="Mint"></button>
          <button type="button" class="swatch-btn" data-accent="violet" aria-label="Violet"></button>
          <button type="button" class="swatch-btn" data-accent="sunset" aria-label="Sunset"></button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-import">
    <div class="sheet">
      <header class="sheet-header">
        <h2>Import backup</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <p class="import-hint">Choose a Work It Daily backup file. This replaces your current streak data.</p>
      <button type="button" class="text-btn primary import-file-btn">Choose file…</button>
      <input type="file" accept="application/json,.json" class="import-file-input" hidden />
      <p class="import-message" aria-live="polite"></p>
    </div>
  </template>

  <template id="tpl-badges">
    <div class="sheet">
      <header class="sheet-header">
        <h2>Badges</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <div class="badges-list" id="badges-list"></div>
    </div>
  </template>

  <template id="tpl-badge-tier-section">
    <section class="badge-tier-section">
      <div class="badge-tier-header">
        <h3 class="badge-tier-title"></h3>
        <span class="badge-tier-count"></span>
      </div>
      <div class="badge-tier-items"></div>
    </section>
  </template>

  <template id="tpl-badge-item">
    <div class="badge-item">
      <span class="badge-icon">🏅</span>
      <div class="badge-text">
        <p class="badge-label"></p>
        <p class="badge-desc"></p>
      </div>
    </div>
  </template>

  <template id="tpl-badge-unlock-item">
    <div class="badge-item unlocked">
      <span class="badge-icon">🏅</span>
      <div class="badge-text">
        <p class="badge-label"></p>
        <p class="badge-desc"></p>
      </div>
    </div>
  </template>

  <template id="tpl-player">
    <header class="topbar player-topbar">
      <div class="player-topbar-left">
        <button class="icon-btn back-btn" aria-label="Exit"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
        <button class="icon-btn sound-toggle-btn" id="sound-toggle-btn" aria-label="Toggle sound"><svg class="icon" viewBox="0 0 576 512" aria-hidden="true" focusable="false"><path d="M48 352l48 0 134.1 119.2c6.4 5.7 14.6 8.8 23.1 8.8 19.2 0 34.8-15.6 34.8-34.8l0-378.4c0-19.2-15.6-34.8-34.8-34.8-8.5 0-16.7 3.1-23.1 8.8L96 160 48 160c-26.5 0-48 21.5-48 48l0 96c0 26.5 21.5 48 48 48zM367 175c-9.4 9.4-9.4 24.6 0 33.9l47 47-47 47c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l47-47 47 47c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-47-47 47-47c9.4-9.4 9.4-24.6 0-33.9s-24.6-9.4-33.9 0l-47 47-47-47c-9.4-9.4-24.6-9.4-33.9 0z"/></svg></button>
      </div>
      <span class="total-timer" id="total-timer">00:00</span>
    </header>
    <div class="player-stage">
      <p class="rescue-banner hidden" id="rescue-banner"></p>
      <p class="interval-name" id="exercise-name"></p>
      <div class="stage-display" id="stage-display">
        <div class="countdown-ring hidden" id="countdown-ring" aria-hidden="true">
          <svg viewBox="0 0 120 120" class="countdown-ring-svg">
            <circle class="countdown-ring-track" cx="60" cy="60" r="54"></circle>
            <circle class="countdown-ring-fill" id="countdown-ring-fill" cx="60" cy="60" r="54"></circle>
          </svg>
        </div>
        <span class="big-number" id="big-number">–</span>
        <span class="big-label" id="big-label"></span>
      </div>
    </div>
    <div class="player-controls">
      <button class="round-btn round-btn-lg" id="play-pause-btn" aria-label="Play or pause"><svg class="icon" viewBox="0 0 448 512" aria-hidden="true" focusable="false"><path d="M91.2 36.9c-12.4-6.8-27.4-6.5-39.6 .7S32 57.9 32 72l0 368c0 14.1 7.5 27.2 19.6 34.4s27.2 7.5 39.6 .7l336-184c12.8-7 20.8-20.5 20.8-35.1s-8-28.1-20.8-35.1l-336-184z"/></svg></button>
      <button class="text-btn primary done-reps-btn hidden" id="done-btn">Done</button>
    </div>
  </template>

  <template id="tpl-finish">
    <div class="finish-screen">
      <canvas id="confetti-canvas"></canvas>
      <div class="finish-card">
        <div class="mascot-slot" id="mascot-slot"></div>
        <h1 id="finish-title">Well done!</h1>
        <p class="finish-exercise" id="finish-exercise-name"></p>
        <div class="finish-streak-box">
          <span class="finish-streak-flame">🔥</span>
          <span class="finish-streak-value" id="finish-streak">0</span>
          <span class="finish-streak-label" id="finish-streak-label">day streak</span>
        </div>
        <p id="new-record" class="finish-record hidden">🏆 New longest streak!</p>
        <p id="freeze-used" class="finish-freeze hidden">❄ A streak freeze covered your missed day.</p>
        <div id="badge-unlock-section" class="badge-unlock-section hidden">
          <p class="badge-unlock-title">Badge unlocked!</p>
          <div id="badge-unlock-list"></div>
        </div>
        <p id="day1-tip" class="day1-tip hidden">💡 <strong>Pro tip!</strong> Set up a daily reminder in your Calendar or Reminders app so you keep your streak going.</p>
        <div id="challenge-friend-section" class="challenge-friend-section hidden">
          <p class="challenge-friend-title">🤝 One week strong!</p>
          <p class="challenge-friend-desc">Challenge a friend to beat your streak.</p>
          <button type="button" class="text-btn secondary" id="challenge-friend-btn">Challenge a friend</button>
        </div>
        <button class="text-btn primary" id="done-btn">Back to today</button>
        <button class="text-btn" id="copy-btn">Copy summary</button>
      </div>
    </div>
  </template>

  <template id="tpl-day-summary">
    <div class="sheet">
      <header class="sheet-header">
        <h2>Summary</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <p class="day-summary-text"></p>
      <div class="form-actions">
        <button type="button" class="text-btn primary day-summary-copy-btn">Copy summary</button>
      </div>
    </div>
  </template>

  <template id="tpl-library">
    <header class="topbar">
      <button class="icon-btn back-btn" aria-label="Back"><svg class="icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg></button>
      <h1>Exercise Library</h1>
    </header>
    <div class="library-list" id="library-list"></div>
  </template>

  <template id="tpl-library-section">
    <section class="library-section">
      <h2 class="library-section-title"></h2>
      <p class="library-section-blurb"></p>
      <div class="library-section-items"></div>
    </section>
  </template>

  <template id="tpl-library-item">
    <button class="card drawer-item">
      <span class="card-title"></span>
      <span class="card-meta"></span>
    </button>
  </template>

  <template id="tpl-exercise-detail">
    <div class="sheet">
      <header class="sheet-header">
        <h2 class="exercise-detail-name"></h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <p class="card-meta exercise-detail-meta"></p>
      <p class="exercise-detail-desc"></p>
    </div>
  </template>

  <template id="tpl-calendar">
    <header class="topbar">
      <button class="icon-btn back-btn" aria-label="Back"><svg class="icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg></button>
      <h1>Calendar</h1>
    </header>
    <div class="calendar-scroll">
      <div class="calendar-nav">
        <button type="button" class="icon-btn" id="calendar-prev-btn" aria-label="Previous month"><svg class="icon" viewBox="0 0 320 512" aria-hidden="true" focusable="false"><path d="M41 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 256 246.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L41 233.4z"/></svg></button>
        <span id="calendar-month-label" class="calendar-month-label"></span>
        <button type="button" class="icon-btn" id="calendar-next-btn" aria-label="Next month"><svg class="icon" viewBox="0 0 320 512" aria-hidden="true" focusable="false"><path d="M278.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-160 160c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L210.7 256 73.4 118.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l160 160z"/></svg></button>
      </div>
      <div class="calendar-weekdays" id="calendar-weekdays"></div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <div class="calendar-legend">
        <span><i class="legend-dot is-done"></i> Done</span>
        <span><i class="legend-dot is-rescued"></i> Saved</span>
        <span><i class="legend-dot is-frozen"></i> Freeze</span>
        <span><i class="legend-dot is-missed"></i> Missed</span>
      </div>
    </div>
  </template>

  <template id="tpl-day-info">
    <div class="sheet confirm-sheet">
      <header class="sheet-header">
        <h2 class="day-info-date"></h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <p class="confirm-message day-info-status"></p>
      <div class="form-actions day-info-actions hidden">
        <button type="button" class="text-btn primary day-info-summary-btn">View summary</button>
      </div>
    </div>
  </template>

  <template id="tpl-save-day">
    <div class="sheet confirm-sheet">
      <header class="sheet-header">
        <h2 class="save-day-date"></h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <p class="confirm-message">You missed this day. Save it with a harder makeup exercise:</p>
      <p class="save-day-exercise"></p>
      <p class="save-day-penalty"></p>
      <div class="form-actions">
        <button type="button" class="text-btn secondary save-day-cancel-btn">Cancel</button>
        <button type="button" class="text-btn danger save-day-start-btn">Start</button>
      </div>
    </div>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
